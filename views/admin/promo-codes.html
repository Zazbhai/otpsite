<script>
  async function init() {
    if (!await requireAdmin()) return;
    loadPromos();
  }
  
  init();

  async function loadPromos(page = 1) {
    const tbody = document.getElementById('promo-body');
    if (!tbody) return;
    try {
      const data = await API.get(`/api/admin/promo-codes?page=${page}`);
      if (!data.codes.length) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-3)">No promo codes found</td></tr>`;
        return;
      }
      tbody.innerHTML = data.codes.map(c => `
        <tr>
          <td><span class="mono font-bold" style="color:var(--accent)">${c.code}</span></td>
          <td class="text-success font-bold">${fmtMoney(c.amount)}</td>
          <td>
            <span class="badge ${c.is_active ? 'badge-deposit' : 'badge-purchase'}">
              ${c.is_active ? 'Active' : 'Inactive'}
            </span>
          </td>
          <td class="text-sm">${c.used_count} / ${c.usage_limit}</td>
          <td class="text-muted text-sm">${fmtDateShort(c.createdAt)}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="deletePromo('${c._id}')">🗑️</button>
          </td>
        </tr>`).join('');
      renderPagination('pagination', data.page, data.pages, loadPromos);
    } catch(e) { toast(e.message, 'error'); }
  }

  async function savePromo() {
    const code = document.getElementById('p-code').value.trim().toUpperCase();
    const amount = parseFloat(document.getElementById('p-amount').value);
    const usage_limit = parseInt(document.getElementById('p-limit').value);
    
    if (!code || !amount) return toast('Code and amount are required', 'error');

    try {
      await API.post('/api/admin/promo-codes', { code, amount, usage_limit });
      toast('Promo code created!', 'success');
      closeModal('promo-modal');
      loadPromos();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function deletePromo(id) {
    if (!await uiConfirm('Delete this promo code? This cannot be undone.')) return;
    try {
      await API.delete(`/api/admin/promo-codes/${id}`);
      toast('Promo code deleted', 'success');
      loadPromos();
    } catch(e) { toast(e.message, 'error'); }
  }
</script>
</body>
