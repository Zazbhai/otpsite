<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 - System Maintenance</title>
  <link rel='icon' type='image/x-icon' href='{{SITE_FAVICON}}'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* Canvas Background */
        #space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            /* Let clicks pass through to canvas */
        }

        /* Advanced Glitch Effect */
        .glitch-wrapper {
            position: relative;
            margin-bottom: 1rem;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            background: rgba(255, 179, 0, 0.1);
            border: 1px solid #ffb300;
            color: #ffb300;
            padding: 5px 15px;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 179, 0, 0.2);
            animation: pulse-warn 2s infinite alternate;
        }

        @keyframes pulse-warn {
            0% {
                opacity: 0.6;
                box-shadow: 0 0 5px rgba(255, 179, 0, 0.2);
            }

            100% {
                opacity: 1;
                box-shadow: 0 0 15px rgba(255, 179, 0, 0.6);
            }
        }

        .cyber-glitch {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 1;
            color: #fff;
            position: relative;
            text-shadow: 0 0 20px rgba(255, 179, 0, 0.5);
            letter-spacing: 4px;
            word-wrap: break-word;
            padding: 0 10px;
            margin: 0;
        }

        .cyber-glitch::before,
        .cyber-glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            /* Changed from black to prevent hiding stars */
            will-change: clip-path, transform, opacity;
        }

        /* Red/Magenta shift */
        .cyber-glitch::before {
            left: 3px;
            text-shadow: -2px 0 #ff003c;
            animation: intense-glitch-1 3s infinite linear alternate-reverse;
            background: #050505;
        }

        /* Cyan shift */
        .cyber-glitch::after {
            left: -3px;
            text-shadow: -2px 0 #00ffff;
            animation: intense-glitch-2 2.5s infinite linear alternate-reverse;
            background: #050505;
        }

        /* Highly erratic clipping for realism, but spaced out for performance */
        @keyframes intense-glitch-1 {

            0%,
            70% {
                clip-path: inset(0 0 0 0);
                opacity: 0;
                transform: translate(0);
            }

            71% {
                opacity: 1;
                clip-path: inset(20% 0 80% 0);
                transform: translate(-4px, 2px);
            }

            74% {
                opacity: 1;
                clip-path: inset(60% 0 10% 0);
                transform: translate(4px, -2px) skewX(5deg);
            }

            78% {
                opacity: 1;
                clip-path: inset(40% 0 50% 0);
                transform: translate(-4px, 4px);
            }

            82% {
                opacity: 1;
                clip-path: inset(80% 0 5% 0);
                transform: translate(4px, -4px) skewX(-5deg);
            }

            86% {
                opacity: 1;
                clip-path: inset(10% 0 70% 0);
                transform: translate(-2px, 2px);
            }

            90% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
                transform: translate(0);
            }

            100% {
                opacity: 0;
            }
        }

        @keyframes intense-glitch-2 {

            0%,
            65% {
                clip-path: inset(0 0 0 0);
                opacity: 0;
                transform: translate(0);
            }

            66% {
                opacity: 1;
                clip-path: inset(10% 0 60% 0);
                transform: translate(4px, -2px);
            }

            70% {
                opacity: 1;
                clip-path: inset(30% 0 20% 0);
                transform: translate(-4px, 2px) skewX(-3deg);
            }

            75% {
                opacity: 1;
                clip-path: inset(70% 0 10% 0);
                transform: translate(4px, 4px);
            }

            80% {
                opacity: 1;
                clip-path: inset(20% 0 50% 0);
                transform: translate(-4px, -4px) skewX(3deg);
            }

            85% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
                transform: translate(0);
            }

            100% {
                opacity: 0;
            }
        }

        /* Status Readout with High-Tech Decryption */
        .status-readout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 1rem;
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }

        .decryption-box {
            background: rgba(255, 179, 0, 0.05);
            border-left: 3px solid #ffb300;
            padding: 15px;
            width: 100%;
            text-align: left;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .decryption-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.1),
                    rgba(0, 0, 0, 0.1) 1px,
                    transparent 1px,
                    transparent 2px);
            pointer-events: none;
        }

        .scramble-text {
            color: #ffb300;
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 179, 0, 0.5);
            margin-bottom: 5px;
            font-family: 'Fira Code', monospace;
            min-height: 1.5rem;
            display: flex;
            align-items: center;
        }

        .scramble-text::before {
            content: "> ";
            color: #00ffff;
            margin-right: 8px;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 1em;
            background: #ffb300;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* CRT Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>

<body>

    <script src="/js/main.js"></script>
<script src="/js/ambient-bg.js"></script>

    
    <!-- CRT Effect -->
    <div class="scanlines"></div>

    <!-- UI -->
    <div class="overlay">
        <div class="glitch-wrapper">
            <div class="status-badge">ERR_CODE: 503</div>
            <h1 class="cyber-glitch" data-text="MAINTENANCE">MAINTENANCE</h1>
        </div>

        <div class="status-readout">
            <div class="decryption-box">
                <div id="decrypt-line-1" class="scramble-text"></div>
                <div id="decrypt-line-2" class="scramble-text" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script>
        /* =========================================
           1. ADVANCED DECRYPTION ANIMATION
        ========================================= */
        const decryptChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()_+-=[]{}|;':,./<>?";
        const logs = [
            "CONNECTING TO MAINFRAME...",
            "BYPASSING FIREWALL...",
            "ERROR 503: SECTOR OFFLINE",
            "INITIATING RECOVERY PROTOCOLS...",
            "ESTIMATED TIME: UNKNOWN",
            "PLEASE STAND BY."
        ];

        const line1El = document.getElementById('decrypt-line-1');
        const line2El = document.getElementById('decrypt-line-2');
        let currentLogIndex = 0;

        function decodeString(element, targetString, callback) {
            let iteration = 0;
            clearInterval(element.scrambleInterval);
            element.style.display = "flex";

            element.scrambleInterval = setInterval(() => {
                element.innerText = targetString
                    .split("")
                    .map((letter, index) => {
                        if (index < iteration) {
                            return targetString[index];
                        }
                        return decryptChars[Math.floor(Math.random() * decryptChars.length)];
                    })
                    .join("");

                if (iteration >= targetString.length) {
                    clearInterval(element.scrambleInterval);
                    // Add blinker at the end of finished text
                    element.innerHTML += '<span class="cursor"></span>';
                    if (callback) callback();
                }

                iteration += 1 / 2; // Speed of decryption
            }, 30);
        }

        function runDecryptionSequence() {
            line1El.innerHTML = "";
            line2El.innerHTML = "";
            line2El.style.display = "none";

            // Decode line 1
            decodeString(line1El, logs[currentLogIndex], () => {
                // Remove cursor from line 1
                const cursor = line1El.querySelector('.cursor');
                if (cursor) cursor.remove();

                currentLogIndex = (currentLogIndex + 1) % logs.length;

                // Pause, then decode line 2
                setTimeout(() => {
                    decodeString(line2El, logs[currentLogIndex], () => {
                        currentLogIndex = (currentLogIndex + 1) % logs.length;

                        // Wait a few seconds, then restart cycle
                        setTimeout(runDecryptionSequence, 4000);
                    });
                }, 800);
            });
        }

        // Start sequence
        setTimeout(runDecryptionSequence, 500);

        /* =========================================
           4. REAL-TIME AUTO-RECOVERY
        ========================================= */
        (function() {
            console.log("Recovery system active.");
            const checkStatus = async () => {
                try {
                    const res = await fetch('/api/auth/status');
                    if (res.ok) {
                        const data = await res.json();
                        if (!data.maintenance) {
                            console.log("Sector restored! Redirecting...");
                            window.location.href = '/dashboard';
                        }
                    }
                } catch (e) {
                    // Site offline or throttled, ignore
                }
            };
            // Check every 3 seconds
            setInterval(checkStatus, 3000);
        })();

    </script>
<script src="/js/main.js"></script><script src="/js/ambient-bg.js"></script></body>

</html>
