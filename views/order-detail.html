<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Detail — {{SITE_NAME}}</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .detail-page { max-width: 520px; margin: 0 auto; }
    
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      animation: slideDown 0.4s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .detail-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-2);
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .detail-back:hover { color: var(--accent); }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .status-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-badge.active { background: rgba(16,185,129,0.12); color: var(--success); }
    .status-badge.active::before { background: var(--success); animation: pulse-badge 2s infinite; }
    .status-badge.completed { background: rgba(59,130,246,0.12); color: var(--accent); }
    .status-badge.completed::before { background: var(--accent); }
    .status-badge.refunded { background: rgba(245,158,11,0.12); color: var(--warning); }
    .status-badge.refunded::before { background: var(--warning); }
    .status-badge.expired, .status-badge.cancelled { background: rgba(100,116,139,0.12); color: var(--text-3); }
    
    @keyframes pulse-badge {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }
    
    .phone-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .phone-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--service-color, var(--grad-primary));
    }
    
    .phone-icon {
      width: 64px;
      height: 64px;
      background: var(--grad-primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    
    .phone-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-3);
      margin-bottom: 12px;
    }
    
    .phone-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
      margin-bottom: 20px;
      word-break: break-all;
      animation: fadeIn 0.6s ease 0.2s both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .phone-number.pending {
      color: var(--text-3);
      font-size: 16px;
      letter-spacing: 0;
    }
    
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .copy-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59,130,246,0.3);
    }
    .copy-btn.copied {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .copy-btn:active { transform: scale(0.95); }
    
    .otp-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 16px;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }
    
    .otp-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-3);
      margin-bottom: 16px;
    }
    
    .otp-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 4px;
      margin-bottom: 24px;
      animation: otpReveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes otpReveal {
      from { opacity: 0; transform: scale(1.1); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .jiggle {
      animation: jiggle 0.5s ease;
    }
    @keyframes jiggle {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px) rotate(-1deg); }
      50% { transform: translateX(4px) rotate(1deg); }
      75% { transform: translateX(-2px) rotate(-0.5deg); }
    }
    
    .otp-waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .otp-waiting-text { color: var(--text-3); font-size: 15px; }
    .otp-dots { display: flex; gap: 8px; }
    .otp-dots span {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: dotBounce 1.4s infinite ease-in-out;
    }
    .otp-dots span:nth-child(1) { animation-delay: 0s; }
    .otp-dots span:nth-child(2) { animation-delay: 0.16s; }
    .otp-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    .timer-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 16px;
      animation: slideUp 0.4s ease 0.2s both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .timer-info { display: flex; align-items: center; gap: 12px; }
    .timer-icon {
      width: 40px;
      height: 40px;
      background: rgba(245,158,11,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .timer-text { font-size: 13px; color: var(--text-2); margin-bottom: 2px; }
    .timer-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--warning);
      letter-spacing: 2px;
    }
    
    .cancel-lock-card {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideUp 0.4s ease 0.2s both;
    }
    .lock-icon {
      width: 44px;
      height: 44px;
      background: rgba(245,158,11,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .lock-text { flex: 1; }
    .lock-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .lock-timer { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--warning); font-weight: 600; }
    
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      animation: slideUp 0.4s ease 0.3s both;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row:hover { background: var(--surface-2); }
    
    .info-label { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 10px; }
    .info-value { font-size: 14px; font-weight: 600; color: var(--text); }
    .info-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }
    
    .action-section { animation: slideUp 0.4s ease 0.4s both; }
    
    .action-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      margin-bottom: 12px;
    }
    .action-btn:last-child { margin-bottom: 0; }
    
    .action-btn.primary {
      background: var(--grad-primary);
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .action-btn.primary:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(59,130,246,0.4);
    }
    
    .action-btn.danger {
      background: rgba(239,68,68,0.1);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .action-btn.danger:hover:not(:disabled) {
      background: rgba(239,68,68,0.2);
      transform: translateY(-2px);
    }
    
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .action-btn:active:not(:disabled) { transform: scale(0.98); }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-message { color: var(--text-2); margin-bottom: 20px; }
    
    @media (max-width: 640px) {
      .phone-number { font-size: 20px; }
      .otp-code { font-size: 36px; letter-spacing: 8px; }
      .info-row { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="/" class="nav-logo">⚡ {{SITE_NAME}}</a>
    <div class="nav-links" id="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/dashboard/buy">Buy</a>
      <a href="/dashboard/orders" class="active">Orders</a>
      <a href="/dashboard/wallet">Wallet</a>
    </div>
    <button class="nav-burger" id="nav-burger">☰</button>
  </div>
</nav>

<div class="layout">
  <main class="main-content">
    <div class="detail-page">
      <div class="detail-header">
        <a href="/dashboard/buy" class="detail-back">← Back</a>
        <div id="status-badge" class="status-badge active">
          <span>Loading...</span>
        </div>
      </div>
      
      <div id="loading-state" class="loading-container">
        <div class="loading-spinner"></div>
        <div style="color: var(--text-3)">Loading order...</div>
      </div>
      
      <div id="error-state" class="error-container" style="display: none;">
        <div class="error-icon">⚠️</div>
        <div id="error-message" class="error-message">Something went wrong</div>
        <button class="btn btn-secondary" onclick="loadOrder()">Try Again</button>
      </div>
      
      <div id="content" style="display: none;">
        <div class="phone-card">
          <div id="order-service-icon" class="phone-icon" style="overflow:hidden;margin:0 auto 20px">📱</div>
          <div class="phone-label">Your Virtual Number</div>
          <div id="phone-number" class="phone-number">+1 234 567 8900</div>
          <button class="copy-btn" onclick="copyPhone()">
            <span id="copy-icon">📋</span>
            <span id="copy-phone-text">Copy Number</span>
          </button>
          <div id="cancel-btn-wrap" style="margin-top:8px"></div>
        </div>
        
        <div class="otp-card-main">
          <div id="otp-content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%;">
            <div class="otp-waiting">
              <div class="otp-waiting-text">Waiting for SMS...</div>
              <div class="otp-dots">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>
        </div>
        
        <div id="timer-section"></div>
        
        <div class="info-card">
          <div class="info-row">
            <div class="info-label"><span>🆔</span> Order ID</div>
            <div id="order-id" class="info-value mono">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>📱</span> Service</div>
            <div id="service-name" class="info-value">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>🌍</span> Country</div>
            <div id="country" class="info-value">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>💰</span> Cost</div>
            <div id="cost" class="info-value">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>🕐</span> Created</div>
            <div id="created" class="info-value">—</div>
          </div>
        </div>
        
        <div id="actions" class="action-section"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/main.js"></script>
<script>
  if (!requireLogin()) {}

  const orderId = location.pathname.split('/').pop();
  let orderData = null;
  let pollInterval = null;
  let countdownInterval = null;
  let cancelLockInterval = null;

  window.showLoading = function() {
    const el = document.getElementById('loading-state');
    const err = document.getElementById('error-state');
    const con = document.getElementById('content');
    if (el) el.style.display = 'flex';
    if (err) err.style.display = 'none';
    if (con) con.style.display = 'none';
  }

  window.showError = function(message) {
    const el = document.getElementById('loading-state');
    const err = document.getElementById('error-state');
    const con = document.getElementById('content');
    if (el) el.style.display = 'none';
    if (err) { err.style.display = 'flex'; const msg = document.getElementById('error-message'); if (msg) msg.textContent = message || 'Failed to load order'; }
    if (con) con.style.display = 'none';
  }

  window.showContent = function() {
    const el = document.getElementById('loading-state');
    const err = document.getElementById('error-state');
    const con = document.getElementById('content');
    if (el) el.style.display = 'none';
    if (err) err.style.display = 'none';
    if (con) con.style.display = 'block';
  }

  window.clearAllIntervals = function() {
    if (pollInterval) { clearTimeout(pollInterval); pollInterval = null; }
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    if (cancelLockInterval) { clearInterval(cancelLockInterval); cancelLockInterval = null; }
  }

  /* ── Audio Notification System ───────────────────────── */
  let audioCtx;
  function initAudio() {
    if (!audioCtx) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      audioCtx = new AudioContext();
    }
  }

  function playOtpSound() {
    initAudio();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'sine';
    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
    osc.frequency.exponentialRampToValueAtTime(880.00, audioCtx.currentTime + 0.1); // A5
    
    gain.gain.setValueAtTime(0, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.5);
  }

  window.updateUI = function(o) {
    if (!o) return;
    orderData = o;

    const statusEl = document.getElementById('status-badge');
    if (statusEl) {
      statusEl.className = `status-badge ${o.status || 'active'}`;
      const statusMap = { active: 'Active', completed: 'Completed', refunded: 'Refunded', expired: 'Cancelled', cancelled: 'Cancelled' };
      statusEl.innerHTML = `<span>${statusMap[o.status] || o.status || 'Active'}</span>`;
    }

    const card = document.querySelector('.phone-card');
    if (card) {
      const color = o.service_color || '#3b82f6';
      card.style.setProperty('--service-color', color);
      card.style.borderColor = `rgba(${parseInt(color.slice(1,3),16)}, ${parseInt(color.slice(3,5),16)}, ${parseInt(color.slice(5,7),16)}, 0.3)`;
    }

    const iconEl = document.getElementById('order-service-icon');
    if (iconEl) {
      iconEl.innerHTML = getServiceIcon({
        name: o.service_name,
        image_url: o.service_image,
        icon_color: o.service_color
      }, '64px');
      // Style adjustment for the wrapper
      iconEl.style.background = 'transparent'; 
      iconEl.style.boxShadow = 'none';
      if (!o.service_image) {
         iconEl.style.background = o.service_color || 'var(--grad-primary)';
         iconEl.style.boxShadow = '0 8px 24px rgba(59,130,246,0.3)';
      }
    }

    const phoneEl = document.getElementById('phone-number');
    if (phoneEl) {
      if (o.phone) {
        let localPhone = o.phone.replace(/^\+\d{1,3}\s?/, '').replace(/\s/g, '').trim();
        if (localPhone.startsWith('91') && localPhone.length > 10) {
          localPhone = localPhone.substring(2);
        }
        phoneEl.textContent = localPhone;
        phoneEl.classList.remove('pending');
      } else {
        phoneEl.textContent = 'Assigning...';
        phoneEl.classList.add('pending');
      }
    }

    const otpContent = document.getElementById('otp-content');
    if (otpContent) {
      if (o.otp || (o.all_otps && o.all_otps.length)) {
        // Deduplicate and filter out empty strings
        const all = [...new Set(((o.all_otps && o.all_otps.length) ? o.all_otps : [o.otp]).filter(x => !!x))];
        const latestOTP = all[all.length - 1];
        // Previous OTPs are all except the latest one
        const prevOTPs = all.slice(0, -1);
        
        let html = `<div style="display:flex;flex-direction:column;gap:12px;align-items:center;width:100%;margin:0 auto">
          <div class="otp-card jiggle" style="background:var(--surface-2);border:1px solid var(--border-2);border-radius:16px;padding:24px;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:320px;box-shadow:0 10px 30px rgba(0,0,0,0.1)">
            <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.15em">Verification Code</div>
            <div style="font-size:12px;line-height:1.4;font-weight:600;color:var(--text);margin:4px 0">${latestOTP}</div>
            <button class="action-btn primary btn-sm w-full" style="margin-top:8px" onclick="copyOTP('${latestOTP.replace(/'/g, "\\'")}')">📋 Copy Full Message</button>
          </div>`;
        
        if (prevOTPs.length) {
          html += `<div style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:320px">
            <div style="font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em;margin:16px 0 4px;text-align:center">Previous Messages</div>`;
          prevOTPs.forEach((code, i) => {
            html += `<div class="otp-card" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;flex-direction:column;gap:8px;animation:none;transform:scale(0.95);opacity:0.8">
              <div style="font-size:13px;line-height:1.4;user-select:text;cursor:text;word-break:break-word;text-align:center">${code}</div>
              <div style="display:flex;justify-content:center">
                <button onclick="copyOTP('${code.replace(/'/g, "\\'")}')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:600">📋 Copy</button>
              </div>
            </div>`;
          });
          html += `</div>`;
        }
        
        if (o.status === 'active' && o.multi_otp_enabled) {
          html += `<button class="action-btn secondary btn-sm" onclick="retrySMS()" style="width:100%;max-width:320px;margin-top:8px">🔄 Get Next OTP</button>`;
        }
        html += `</div>`;
        otpContent.innerHTML = html;
      } else if (o.status === 'active') {
        otpContent.innerHTML = `<div class="otp-waiting">
          <div style="background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);border-radius:20px;padding:32px 48px;display:flex;flex-direction:column;align-items:center;gap:16px">
            <div style="font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:0.1em">Awaiting SMS</div>
            <div class="otp-dots"><span></span><span></span><span></span></div>
            <div style="font-size:12px;color:var(--text-3)">Code will appear here automatically</div>
          </div>
        </div>`;
      } else {
        otpContent.innerHTML = `<div style="color:var(--text-3);font-size:14px;font-weight:500;text-align:center;padding:24px">No OTP received</div>`;
      }
    }

    const timerSection = document.getElementById('timer-section');
    if (!timerSection) return;
    timerSection.innerHTML = '';

    if (o.status === 'active' && o.min_cancel_at) {
      const lockTime = Math.ceil((new Date(o.min_cancel_at) - Date.now()) / 1000);
      if (lockTime > 0) {
        timerSection.innerHTML += `<div class="cancel-lock-card"><div class="lock-icon">🔒</div><div class="lock-text"><div class="lock-title">Cancel Locked</div><div class="lock-timer" id="cancel-lock-timer">${formatTime(lockTime)}</div></div></div>`;
      }
    }

    if (o.status === 'active' && o.expires_at) {
      const expTime = Math.ceil((new Date(o.expires_at) - Date.now()) / 1000);
      if (expTime > 0) {
        timerSection.innerHTML += `<div class="timer-card"><div class="timer-info"><div class="timer-icon">⏱️</div><div><div class="timer-text">Expires in</div><div id="timer" class="timer-value">--:--</div></div></div></div>`;
      }
    }

    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    if (cancelLockInterval) { clearInterval(cancelLockInterval); cancelLockInterval = null; }

    if (o.status === 'active' && o.expires_at) {
      const expires = new Date(o.expires_at).getTime();
      const tick = () => {
        const timerEl = document.getElementById('timer');
        if (!timerEl) return;
        const diff = expires - Date.now();
        if (diff <= 0) { timerEl.textContent = '00:00'; loadOrder(); return; }
        const m = Math.floor(diff / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      };
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    if (o.status === 'active' && o.min_cancel_at) {
      const minCancel = new Date(o.min_cancel_at).getTime();
      const tick = () => {
        const timerEl = document.getElementById('cancel-lock-timer');
        if (!timerEl) return;
        const diff = minCancel - Date.now();
        if (diff <= 0) { loadOrder(); return; }
        timerEl.textContent = formatTime(Math.ceil(diff / 1000));
      };
      tick();
      cancelLockInterval = setInterval(tick, 1000);
    }

    const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    setText('order-id', o.order_id);
    setText('service-name', o.service_name);
    setText('country', o.server_country || o.country || '—');
    setText('cost', fmtMoney(o.cost));
    setText('created', fmtDate(o.createdAt));

    const cancelWrap = document.getElementById('cancel-btn-wrap');
    if (cancelWrap) {
      let canCancel = o.status === 'active' && (!o.min_cancel_at || new Date(o.min_cancel_at) <= new Date());
      if (o.status === 'active' && canCancel) {
        cancelWrap.innerHTML = `<button class="action-btn danger" id="cancel-btn" onclick="cancelOrder()">❌ Cancel Order</button>`;
      } else {
        cancelWrap.innerHTML = '';
      }
    }
  }

  window.formatTime = function(seconds) {
    if (seconds >= 60) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}m ${String(s).padStart(2, '0')}s`;
    }
    return `${seconds}s`;
  }

  window.loadOrder = async function() {
    // ONLY show loading overlay if we have absolutely NO data (first load)
    const overlay = document.getElementById('loading-state');
    const content = document.getElementById('content');
    
    if (!orderData && content.style.display === 'none') {
      showLoading();
    }
    
    clearAllIntervals();

    try {
      const data = await API.get(`/api/user/orders/${orderId}`);
      orderData = data;
      showContent();
      updateUI(data);

      if (pollInterval) { clearTimeout(pollInterval); pollInterval = null; }

      if (data.status === 'active' || data.status === 'completed') {
        const intervalMs = (data.check_interval || 3) * 1000;
        const poll = async () => {
          try {
            const updated = await API.get(`/api/user/orders/${orderId}`);
            const newsCount = (updated.all_otps?.length || 0);
            const oldsCount = (orderData?.all_otps?.length || 0);
            const hasNewOtp = (updated.otp && updated.otp !== orderData?.otp) || (newsCount > oldsCount);

            if (hasNewOtp) playOtpSound();

            const changed = updated.status !== orderData?.status || 
                           updated.otp !== orderData?.otp || 
                           updated.phone !== orderData?.phone ||
                           (newsCount !== oldsCount);
                           
            if (changed) {
              orderData = updated;
              updateUI(updated);
            }
          } catch (e) {
            console.warn('Poll error:', e.message); 
          } finally {
            if (orderData && (orderData.status === 'active' || orderData.status === 'completed')) {
              pollInterval = setTimeout(poll, intervalMs);
            }
          }
        };
        pollInterval = setTimeout(poll, intervalMs);
      }
    } catch (e) {
      console.warn('Silent load retry:', e.message);
      // Auto-retry after 5s without changing the visible UI state
      setTimeout(loadOrder, 5000);
    }
  }

  // Handle browser audio policy - init on first click
  document.addEventListener('click', () => initAudio(), { once: true });

  /**
   * Called by the global SSE client in main.js whenever the server
   * pushes a real-time 'order' event for this specific order.
   * Updates the UI instantly without making an extra HTTP fetch.
   */
  window.handleRealtimeOrderUpdate = function(data) {
    if (!data || data.orderId !== orderId) return;
    const prev = orderData;

    // Merge new SSE data into the current order snapshot
    const merged = { ...orderData, ...{
      status:   data.status   || orderData?.status,
      otp:      data.otp      || orderData?.otp,
      all_otps: data.all_otps || orderData?.all_otps,
    }};

    // Play sound if new OTP arrived
    const prevCount = prev?.all_otps?.length || (prev?.otp ? 1 : 0);
    const newCount  = merged.all_otps?.length || (merged.otp ? 1 : 0);
    if (newCount > prevCount) playOtpSound();

    // Show content if still in loading state
    showContent();
    orderData = merged;
    updateUI(merged);
  };

  window.copyPhone = async function() {
    if (!orderData?.phone) return;
    let phoneNum = orderData.phone.replace(/^\+\d{1,3}\s?/, '').replace(/\s/g, '').trim();
    if (phoneNum.startsWith('91') && phoneNum.length > 10) {
      phoneNum = phoneNum.substring(2);
    }
    try {
      if (navigator.clipboard && window.clipboard) {
        await navigator.clipboard.writeText(phoneNum);
      } else {
        const textArea = document.createElement('textarea');
        textArea.value = phoneNum;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
      }
      const btn = document.querySelector('.copy-btn');
      const icon = document.getElementById('copy-icon');
      const text = document.getElementById('copy-phone-text');
      btn.classList.add('copied');
      if (icon) icon.textContent = '✅';
      if (text) text.textContent = 'Copied!';
      setTimeout(() => {
        btn.classList.remove('copied');
        if (icon) icon.textContent = '📋';
        if (text) text.textContent = 'Copy Number';
      }, 2000);
    } catch (e) {
      toast('Failed to copy', 'error');
    }
  }

  window.copyOTP = async function(code) {
    try {
      const otp = code || orderData?.otp || (orderData?.all_otps ? orderData.all_otps[orderData.all_otps.length - 1] : null);
      if (!otp) { toast('No OTP to copy', 'error'); return; }
      
      if (navigator.clipboard && window.clipboard) {
        await navigator.clipboard.writeText(otp);
      } else {
        const textArea = document.createElement('textarea');
        textArea.value = otp;
        textArea.style.position = 'fixed';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
      }
      toast('Copied!', 'success');
    } catch (e) {
      console.error('Copy failed:', e);
      toast('Failed to copy', 'error');
    }
  }

  window.cancelOrder = async function() {
    if (!await uiConfirm('Cancel this order and refund to your wallet?')) return;
    const btn = document.getElementById('cancel-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div>'; }
    try {
      await API.post(`/api/user/orders/${orderId}/cancel`);
      toast('Order cancelled', 'success');
      clearAllIntervals();
      loadOrder();
    } catch (e) {
      toast(e.message, 'error');
      loadOrder();
    }
  }

  window.retrySMS = async function() {
    if (!await uiConfirm('Request another SMS for this number?')) return;
    const btn = document.getElementById('retry-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div>'; }
    try {
      await API.post(`/api/user/orders/${orderId}/retry`);
      toast('SMS requested', 'success');
      loadOrder();
    } catch (e) {
      toast(e.message, 'error');
      loadOrder();
    }
  }

  window.addEventListener('beforeunload', clearAllIntervals);
  loadOrder();
</script>
</body>
</html>
