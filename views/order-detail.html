<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Detail — Rapid OTP</title>
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .detail-page { max-width: 520px; margin: 0 auto; }
    
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      animation: slideDown 0.4s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .detail-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-2);
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .detail-back:hover { color: var(--accent); }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .status-badge::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .status-badge.active { background: rgba(16,185,129,0.12); color: var(--success); }
    .status-badge.active::before { background: var(--success); animation: pulse-badge 2s infinite; }
    .status-badge.completed { background: rgba(59,130,246,0.12); color: var(--accent); }
    .status-badge.completed::before { background: var(--accent); }
    .status-badge.refunded { background: rgba(245,158,11,0.12); color: var(--warning); }
    .status-badge.refunded::before { background: var(--warning); }
    .status-badge.expired, .status-badge.cancelled { background: rgba(100,116,139,0.12); color: var(--text-3); }
    
    @keyframes pulse-badge {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.5; }
    }
    
    .phone-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 28px;
      text-align: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .phone-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--grad-primary);
    }
    
    .phone-icon {
      width: 64px;
      height: 64px;
      background: var(--grad-primary);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(59,130,246,0.3);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    
    .phone-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-3);
      margin-bottom: 12px;
    }
    
    .phone-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
      margin-bottom: 20px;
      word-break: break-all;
      animation: fadeIn 0.6s ease 0.2s both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .phone-number.pending {
      color: var(--text-3);
      font-size: 16px;
      letter-spacing: 0;
    }
    
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .copy-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(59,130,246,0.3);
    }
    .copy-btn.copied {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .copy-btn:active { transform: scale(0.95); }
    
    .otp-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 16px;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }
    
    .otp-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-3);
      margin-bottom: 16px;
    }
    
    .otp-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 4px;
      margin-bottom: 24px;
      animation: otpReveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes otpReveal {
      from { opacity: 0; transform: scale(1.2); letter-spacing: 10px; }
      to { opacity: 1; transform: scale(1); letter-spacing: 6px; }
    }
    
    .otp-waiting {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .otp-waiting-text { color: var(--text-3); font-size: 15px; }
    .otp-dots { display: flex; gap: 8px; }
    .otp-dots span {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: dotBounce 1.4s infinite ease-in-out;
    }
    .otp-dots span:nth-child(1) { animation-delay: 0s; }
    .otp-dots span:nth-child(2) { animation-delay: 0.16s; }
    .otp-dots span:nth-child(3) { animation-delay: 0.32s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    .timer-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 16px;
      animation: slideUp 0.4s ease 0.2s both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .timer-info { display: flex; align-items: center; gap: 12px; }
    .timer-icon {
      width: 40px;
      height: 40px;
      background: rgba(245,158,11,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .timer-text { font-size: 13px; color: var(--text-2); margin-bottom: 2px; }
    .timer-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--warning);
      letter-spacing: 2px;
    }
    
    .cancel-lock-card {
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 16px;
      padding: 18px 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideUp 0.4s ease 0.2s both;
    }
    .lock-icon {
      width: 44px;
      height: 44px;
      background: rgba(245,158,11,0.15);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .lock-text { flex: 1; }
    .lock-title { font-weight: 600; font-size: 14px; color: var(--text); margin-bottom: 4px; }
    .lock-timer { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--warning); font-weight: 600; }
    
    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 16px;
      animation: slideUp 0.4s ease 0.3s both;
    }
    
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row:hover { background: var(--surface-2); }
    
    .info-label { font-size: 13px; color: var(--text-3); display: flex; align-items: center; gap: 10px; }
    .info-value { font-size: 14px; font-weight: 600; color: var(--text); }
    .info-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }
    
    .action-section { animation: slideUp 0.4s ease 0.4s both; }
    
    .action-btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      margin-bottom: 12px;
    }
    .action-btn:last-child { margin-bottom: 0; }
    
    .action-btn.primary {
      background: var(--grad-primary);
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .action-btn.primary:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(59,130,246,0.4);
    }
    
    .action-btn.danger {
      background: rgba(239,68,68,0.1);
      color: var(--danger);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .action-btn.danger:hover:not(:disabled) {
      background: rgba(239,68,68,0.2);
      transform: translateY(-2px);
    }
    
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .action-btn:active:not(:disabled) { transform: scale(0.98); }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
    }
    .error-icon { font-size: 48px; margin-bottom: 16px; }
    .error-message { color: var(--text-2); margin-bottom: 20px; }
    
    @media (max-width: 640px) {
      .phone-number { font-size: 20px; }
      .otp-code { font-size: 36px; letter-spacing: 8px; }
      .info-row { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="/" class="nav-logo">⚡ Rapid OTP</a>
    <div class="nav-links" id="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/dashboard/buy">Buy</a>
      <a href="/dashboard/orders" class="active">Orders</a>
      <a href="/dashboard/wallet">Wallet</a>
    </div>
    <button class="nav-burger" id="nav-burger">☰</button>
  </div>
</nav>

<div class="layout">
  <main class="main-content">
    <div class="detail-page">
      <div class="detail-header">
        <a href="/dashboard/orders" class="detail-back">← Back</a>
        <div id="status-badge" class="status-badge active">
          <span>Loading...</span>
        </div>
      </div>
      
      <div id="loading-state" class="loading-container">
        <div class="loading-spinner"></div>
        <div style="color: var(--text-3)">Loading order...</div>
      </div>
      
      <div id="error-state" class="error-container" style="display: none;">
        <div class="error-icon">⚠️</div>
        <div id="error-message" class="error-message">Something went wrong</div>
        <button class="btn btn-secondary" onclick="loadOrder()">Try Again</button>
      </div>
      
      <div id="content" style="display: none;">
        <div class="phone-card">
          <div class="phone-icon">📱</div>
          <div class="phone-label">Your Virtual Number</div>
          <div id="phone-number" class="phone-number">+1 234 567 8900</div>
          <button class="copy-btn" onclick="copyPhone()">
            <span id="copy-icon">📋</span>
            <span id="copy-phone-text">Copy Number</span>
          </button>
        </div>
        
        <div class="otp-card">
          <div class="otp-label">Verification Code</div>
          <div id="otp-content">
            <div class="otp-waiting">
              <div class="otp-waiting-text">Waiting for SMS...</div>
              <div class="otp-dots">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>
        </div>
        
        <div id="timer-section"></div>
        
        <div class="info-card">
          <div class="info-row">
            <div class="info-label"><span>🆔</span> Order ID</div>
            <div id="order-id" class="info-value mono">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>📱</span> Service</div>
            <div id="service-name" class="info-value">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>🌍</span> Country</div>
            <div id="country" class="info-value">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>💰</span> Cost</div>
            <div id="cost" class="info-value">—</div>
          </div>
          <div class="info-row">
            <div class="info-label"><span>🕐</span> Created</div>
            <div id="created" class="info-value">—</div>
          </div>
        </div>
        
        <div id="actions" class="action-section"></div>
      </div>
    </div>
  </main>
</div>

<script src="/js/main.js"></script>
<script>
  if (!requireLogin()) {}

  const orderId = location.pathname.split('/').pop();
  let orderData = null;
  let pollInterval = null;
  let countdownInterval = null;
  let cancelLockInterval = null;

  window.showLoading = function() {
    const el = document.getElementById('loading-state');
    const err = document.getElementById('error-state');
    const con = document.getElementById('content');
    if (el) el.style.display = 'flex';
    if (err) err.style.display = 'none';
    if (con) con.style.display = 'none';
  }

  window.showError = function(message) {
    const el = document.getElementById('loading-state');
    const err = document.getElementById('error-state');
    const con = document.getElementById('content');
    if (el) el.style.display = 'none';
    if (err) { err.style.display = 'flex'; const msg = document.getElementById('error-message'); if (msg) msg.textContent = message || 'Failed to load order'; }
    if (con) con.style.display = 'none';
  }

  window.showContent = function() {
    const el = document.getElementById('loading-state');
    const err = document.getElementById('error-state');
    const con = document.getElementById('content');
    if (el) el.style.display = 'none';
    if (err) err.style.display = 'none';
    if (con) con.style.display = 'block';
  }

  window.clearAllIntervals = function() {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    if (cancelLockInterval) { clearInterval(cancelLockInterval); cancelLockInterval = null; }
  }

  window.updateUI = function(o) {
    if (!o) return;
    orderData = o;

    const statusEl = document.getElementById('status-badge');
    if (statusEl) {
      statusEl.className = `status-badge ${o.status || 'active'}`;
      const statusMap = { active: 'Active', completed: 'Completed', refunded: 'Refunded', expired: 'Expired', cancelled: 'Cancelled' };
      statusEl.innerHTML = `<span>${statusMap[o.status] || o.status || 'Active'}</span>`;
    }

    const phoneEl = document.getElementById('phone-number');
    if (phoneEl) {
      if (o.phone) {
        phoneEl.textContent = o.phone;
        phoneEl.classList.remove('pending');
      } else {
        phoneEl.textContent = 'Assigning...';
        phoneEl.classList.add('pending');
      }
    }

    const otpContent = document.getElementById('otp-content');
    if (otpContent) {
      if (o.otp) {
        let html = `<div class="otp-code" id="ui-otp-val" style="font-size:24px; letter-spacing:4px">${o.otp}</div>`;
        html += `<div style="display:flex; gap:10px; justify-content:center; margin-top:15px">
          <button class="action-btn primary btn-sm" onclick="copyOTP()" style="padding:8px 12px; font-size:13px"><span>📋</span> Copy</button>`;
        if ((o.status === 'active' && o.multi_otp_enabled) || o.status === 'completed') {
          html += `<button class="action-btn secondary btn-sm" onclick="retrySMS()" style="padding:8px 12px; font-size:13px"><span>🔄</span> Next</button>`;
        }
        html += `</div>`;
        otpContent.innerHTML = html;
      } else if (o.status === 'active') {
        otpContent.innerHTML = `<div class="otp-waiting"><div class="otp-waiting-text">Waiting for SMS...</div><div class="otp-dots"><span></span><span></span><span></span></div></div>`;
      } else {
        otpContent.innerHTML = `<div style="color:var(--text-3);font-size:16px;font-weight:500">No OTP received</div>`;
      }
    }

    const timerSection = document.getElementById('timer-section');
    if (!timerSection) return;
    timerSection.innerHTML = '';

    if (o.status === 'active' && o.min_cancel_at) {
      const lockTime = Math.ceil((new Date(o.min_cancel_at) - Date.now()) / 1000);
      if (lockTime > 0) {
        timerSection.innerHTML += `<div class="cancel-lock-card"><div class="lock-icon">🔒</div><div class="lock-text"><div class="lock-title">Cancel Locked</div><div class="lock-timer" id="cancel-lock-timer">${formatTime(lockTime)}</div></div></div>`;
      }
    }

    if (o.status === 'active' && o.expires_at) {
      const expTime = Math.ceil((new Date(o.expires_at) - Date.now()) / 1000);
      if (expTime > 0) {
        timerSection.innerHTML += `<div class="timer-card"><div class="timer-info"><div class="timer-icon">⏱️</div><div><div class="timer-text">Expires in</div><div id="timer" class="timer-value">--:--</div></div></div></div>`;
      }
    }

    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
    if (cancelLockInterval) { clearInterval(cancelLockInterval); cancelLockInterval = null; }

    if (o.status === 'active' && o.expires_at) {
      const expires = new Date(o.expires_at).getTime();
      const tick = () => {
        const timerEl = document.getElementById('timer');
        if (!timerEl) return;
        const diff = expires - Date.now();
        if (diff <= 0) { timerEl.textContent = '00:00'; loadOrder(); return; }
        const m = Math.floor(diff / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      };
      tick();
      countdownInterval = setInterval(tick, 1000);
    }

    if (o.status === 'active' && o.min_cancel_at) {
      const minCancel = new Date(o.min_cancel_at).getTime();
      const tick = () => {
        const timerEl = document.getElementById('cancel-lock-timer');
        if (!timerEl) return;
        const diff = minCancel - Date.now();
        if (diff <= 0) { loadOrder(); return; }
        timerEl.textContent = formatTime(Math.ceil(diff / 1000));
      };
      tick();
      cancelLockInterval = setInterval(tick, 1000);
    }

    const setText = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    setText('order-id', o.order_id);
    setText('service-name', o.service_name);
    setText('country', o.server_country || o.country || '—');
    setText('cost', fmtMoney(o.cost));
    setText('created', fmtDate(o.createdAt));

    const actionsEl = document.getElementById('actions');
    if (actionsEl) {
      let canCancel = o.status === 'active' && (!o.min_cancel_at || new Date(o.min_cancel_at) <= new Date());
      let actionsHtml = '';
      if (o.status === 'active' && canCancel) {
        actionsHtml += `<button class="action-btn danger w-full" id="cancel-btn">❌ Cancel Order</button>`;
      }
      actionsEl.innerHTML = actionsHtml;
      
      const cancelBtn = document.getElementById('cancel-btn');
      if (cancelBtn) cancelBtn.onclick = window.cancelOrder;
    }
  }

  window.formatTime = function(seconds) {
    if (seconds >= 60) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}m ${String(s).padStart(2, '0')}s`;
    }
    return `${seconds}s`;
  }

  window.loadOrder = async function() {
    showLoading();
    clearAllIntervals();

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 15000);

    try {
      const data = await API.get(`/api/user/orders/${orderId}`, { signal: controller.signal });
      clearTimeout(timeout);
      orderData = data;
      showContent();
      updateUI(data);

      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }

      if (data.status === 'active' || data.status === 'completed') {
        pollInterval = setInterval(async () => {
          try {
            const updated = await API.get(`/api/user/orders/${orderId}`);
            if (updated.status !== orderData.status || (updated.all_otps && updated.all_otps.length !== orderData.all_otps.length) || updated.otp !== orderData.otp) {
              orderData = updated;
              updateUI(updated);
            }
          } catch (e) { console.warn('Poll error:', e.message); }
        }, 3000);
      }
    } catch (e) {
      clearTimeout(timeout);
      if (e.name === 'AbortError') {
        showError('Request timed out. Please try again.');
      } else {
        showError(e.message || 'Failed to load order');
      }
    }
  }

  window.copyPhone = async function() {
    if (!orderData?.phone) return;
    await navigator.clipboard.writeText(orderData.phone);
    const btn = document.querySelector('.copy-btn');
    const icon = document.getElementById('copy-icon');
    const text = document.getElementById('copy-phone-text');
    btn.classList.add('copied');
    if (icon) icon.textContent = '✅';
    if (text) text.textContent = 'Copied!';
    setTimeout(() => {
      btn.classList.remove('copied');
      if (icon) icon.textContent = '📋';
      if (text) text.textContent = 'Copy Number';
    }, 2000);
  }

  window.copyOTP = async function() {
    if (!orderData?.otp) return;
    await navigator.clipboard.writeText(orderData.otp);
    toast('OTP Copied to clipboard!', 'success');
  }

  window.cancelOrder = async function() {
    if (!await uiConfirm('Cancel this order and refund to your wallet?')) return;
    const btn = document.getElementById('cancel-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div>'; }
    try {
      await API.post(`/api/user/orders/${orderId}/cancel`);
      toast('Order cancelled', 'success');
      clearAllIntervals();
      loadOrder();
    } catch (e) {
      toast(e.message, 'error');
      loadOrder();
    }
  }

  window.retrySMS = async function() {
    if (!await uiConfirm('Request another SMS for this number?')) return;
    const btn = document.getElementById('retry-btn');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="loading-spinner" style="width:16px;height:16px;border-width:2px;margin:0"></div>'; }
    try {
      await API.post(`/api/user/orders/${orderId}/retry`);
      toast('SMS requested', 'success');
      loadOrder();
    } catch (e) {
      toast(e.message, 'error');
      loadOrder();
    }
  }

  window.addEventListener('beforeunload', clearAllIntervals);
  loadOrder();
</script>
</body>
</html>
