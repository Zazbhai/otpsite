<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Sector Not Found</title>
  <link rel='icon' type='image/x-icon' href='{{SITE_FAVICON}}'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            user-select: none;
        }

        /* Canvas Background */
        #space {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlay */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let clicks pass through to canvas */
        }

        /* Advanced Glitch Effect */
        .glitch-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .glitch {
            font-size: clamp(6rem, 15vw, 12rem);
            font-weight: 700;
            line-height: 1;
            color: #fff;
            position: relative;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            opacity: 0.8;
            will-change: clip-path; /* Hardware acceleration for potato devices */
        }

        .glitch::before {
            left: 5px;
            text-shadow: -3px 0 #ff003c;
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -5px;
            text-shadow: -3px 0 #00ffff;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(30% 0 20% 0); }
            40% { clip-path: inset(70% 0 10% 0); }
            60% { clip-path: inset(20% 0 50% 0); }
            80% { clip-path: inset(50% 0 30% 0); }
            100% { clip-path: inset(5% 0 80% 0); }
        }

        /* Minimalist Status Readout */
        .status-readout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 2rem;
        }

        .warning-icon {
            font-size: 2.5rem;
            color: #ff003c;
            text-shadow: 0 0 15px rgba(255, 0, 60, 0.6);
            animation: pulse-warn 2s infinite;
        }

        @keyframes pulse-warn {
            0%, 100% { opacity: 0.5; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .scramble-text {
            color: #00ffff;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
            text-align: center;
            min-height: 1.5rem;
        }

        /* Interactive Button */
        .cyber-button {
            margin-top: 2rem;
            padding: 15px 40px;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: #000;
            background: #00ffff;
            border: none;
            cursor: pointer;
            position: relative;
            pointer-events: auto; /* Re-enable clicks for button */
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            transition: all 0.2s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .cyber-button:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
            transform: scale(1.05);
        }

        .cyber-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transition: all 0.5s ease;
        }

        .cyber-button:hover::after {
            left: 100%;
        }

        /* CRT Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 100;
        }

        /* Hide Navbar for 404 */
        .navbar, nav, .mb-more-menu, #mb-nav-more-menu, .mb-nav-bottom {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- CRT Effect -->
    <div class="scanlines"></div>

    <!-- UI -->
    <div class="overlay">
        <div class="glitch-wrapper">
            <div class="glitch" data-text="404">404</div>
        </div>

        <div class="status-readout">
            <div class="warning-icon">⚠</div>
            <div id="scrambler" class="scramble-text"></div>
        </div>

        <button class="cyber-button" onclick="window.location.href='/dashboard'">
            Dashboard
        </button>

    </div>

    <script src="/js/main.js"></script>
    <script src="/js/ambient-bg.js"></script>
    <script>
        /* =========================================
           1. DECODING TEXT EFFECT
        ========================================= */
        const scramblerEl = document.getElementById('scrambler');
        const finalString = "CRITICAL_ERROR // SECTOR_NOT_FOUND";
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        
        let iteration = 0;
        let scrambleInterval = null;

        function startScramble() {
            iteration = 0;
            clearInterval(scrambleInterval);
            
            scrambleInterval = setInterval(() => {
                scramblerEl.innerText = finalString
                    .split("")
                    .map((letter, index) => {
                        if(index < iteration) {
                            return finalString[index];
                        }
                        return letters[Math.floor(Math.random() * letters.length)];
                    })
                    .join("");
                
                if(iteration >= finalString.length){
                    clearInterval(scrambleInterval);
                    // Restart the scramble effect every 6 seconds to keep it dynamic
                    setTimeout(startScramble, 6000); 
                }
                
                iteration += 1 / 3;
            }, 30);
        }
        
        startScramble();

    </script>
</body>
</html>
