<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/preloader.js"></script>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pricing — {{SITE_NAME}}</title>
  <meta name="description" content="View all {{SITE_NAME}} service pricing by country and provider." />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<nav class="navbar">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between">
    <a href="/" class="nav-logo">⚡ {{SITE_NAME}}</a>
    <div class="nav-links" id="nav-links">
      <a href="/pricing" class="active">Pricing</a>
      <a href="/how-it-works">How It Works</a>
      <a href="/support">Support</a>
    </div>
    <div style="display:flex;align-items:center;gap:12px;margin-left:auto">
      <span id="nav-auth-mobile" class="nav-auth-mobile"></span>
      <span id="nav-auth"></span>
      <button class="nav-burger" id="nav-burger">☰</button>
    </div>
  </div>
</nav>
<div style="padding-top:64px">
  <section class="section">
    <div class="container">
      <div class="section-header">
        <h1>Service <span class="gradient-text">Pricing</span></h1>
      </div>
      <div class="search-bar mb-8" style="max-width:360px;margin:0 auto 32px">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search services…" oninput="filterPricing()" />
      </div>
      <div id="pricing-grid" style="display:flex;flex-direction:column;gap:16px">
        <div style="text-align:center;padding:64px;color:var(--text-3)"><div class="spinner" style="margin:0 auto"></div></div>
      </div>
    </div>
  </section>
</div>
<footer>
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 {{SITE_NAME}}. All rights reserved.</p>
      <div style="display:flex;gap:16px"><a href="/" style="color:var(--text-3)">Home</a><a href="/support" style="color:var(--text-3)">Support</a><a href="/terms" style="color:var(--text-3)">Terms</a></div>
    </div>
  </div>
</footer>
<script src="/js/main.js"></script>
<script>
  const navAuth = document.getElementById("nav-auth");
  if (isLoggedIn()) navAuth.innerHTML = '<a href="/dashboard" class="btn btn-primary btn-sm">Dashboard →</a>';
  else navAuth.innerHTML = '<a href="/?login=1" class="btn btn-primary btn-sm">Login</a>';

  let services = [];
  async function loadPricing() {
    try {
      const resp = await fetch("/api/user/services");
      if (!resp.ok) throw new Error("Failed to load pricing data");
      services = await resp.json();
      renderPricing(services);
    } catch(e) {
      document.getElementById("pricing-grid").innerHTML = `<div style="text-align:center;color:var(--danger)">${e.message}</div>`;
    }
  }

  function renderPricing(list) {
    const grid = document.getElementById("pricing-grid");
    
    // Group services by name
    const groups = {};
    list.forEach(s => {
      if (!groups[s.name]) groups[s.name] = { 
        name: s.name, 
        icon: s.image_url, 
        items: [] 
      };
      groups[s.name].items.push(s);
    });

    grid.innerHTML = Object.values(groups).map(g => `
      <div class="card pricing-group-card" style="padding:0; overflow:hidden; margin-bottom:24px;">
        <div class="group-header">
          <div class="group-icon-wrap">
            ${g.icon ? `<img src="${g.icon}" class="group-img">` : "📱"}
          </div>
          <div class="group-info">
            <h3 class="group-title">${g.name}</h3>
            <span class="group-subtitle">${g.items.length} options available</span>
          </div>
        </div>

        <div class="pricing-list">
          ${g.items.map(s => `
            <div class="pricing-row">
              <div class="pricing-col country-col">
                <span class="col-label">Country</span>
                <div class="col-val">
                  <span class="flag-icon">${s.server_id?.country_id?.flag || "🌐"}</span>
                  <span class="country-name">${s.country_code}</span>
                </div>
              </div>

              <div class="pricing-col server-col">
                <span class="col-label">Server</span>
                <div class="col-val">
                  <span class="server-badge">${s.server_id?.name || "Standard"}</span>
                </div>
              </div>

              <div class="pricing-col quality-col">
                <span class="col-label">Quality</span>
                <div class="col-val">
                  <div class="stat-item success">⚡ ${s.success_rate || "95%"}</div>
                  <div class="stat-item time">⏱ ~${s.avg_time || "2m"}</div>
                </div>
              </div>

              <div class="pricing-col price-col">
                <span class="col-label">Price</span>
                <div class="col-val price-text">${fmtMoney(s.price)}</div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>`).join("") || `<div style="text-align:center;padding:64px;opacity:0.6;">No services matching your search</div>`;
  }

  function filterPricing() {
    const q = document.getElementById("search").value.toLowerCase();
    renderPricing(services.filter(s => s.name.toLowerCase().includes(q)));
  }

  loadPricing();
</script>

<style>
  .pricing-group-card { border: 1px solid var(--border); background: rgba(255,255,255,0.02); }
  .group-header { padding: 24px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01); }
  .group-icon-wrap { width: 56px; height: 56px; border-radius: 14px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid rgba(255,255,255,0.1); }
  .group-img { width: 36px; height: 36px; object-fit: contain; }
  .group-title { margin: 0; font-size: 20px; color: #fff; font-weight: 700; }
  .group-subtitle { font-size: 13px; opacity: 0.5; }

  .pricing-list { display: flex; flex-direction: column; }
  .pricing-row { display: grid; grid-template-columns: 1.5fr 1fr 1.5fr 1fr; align-items: center; padding: 20px 24px; border-bottom: 1px solid var(--border); gap: 16px; transition: background 0.3s; }
  .pricing-row:last-child { border-bottom: none; }
  .pricing-row:hover { background: rgba(255,255,255,0.03); }

  .col-label { display: none; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.4; margin-bottom: 6px; font-weight: 600; }
  .col-val { display: flex; align-items: center; gap: 10px; }
  
  .flag-icon { font-size: 18px; }
  .country-name { font-weight: 600; color: #fff; }
  
  .server-badge { font-size: 11px; padding: 4px 10px; background: rgba(255,255,255,0.07); border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); opacity: 0.8; }
  
  .stat-item { font-size: 12px; }
  .stat-item.success { color: var(--success); font-weight: 600; }
  .stat-item.time { opacity: 0.5; }
  
  .price-text { font-size: 18px; font-weight: 800; color: var(--accent); }

  @media (max-width: 992px) {
    .pricing-row { grid-template-columns: 1fr 1fr 1fr; }
  }

  @media (max-width: 640px) {
    .pricing-row { grid-template-columns: 1fr 1fr; gap: 20px; padding: 24px; }
    .col-label { display: block; }
    .pricing-col { display: flex; flex-direction: column; }
    .price-text { font-size: 22px; }
    .col-val { flex-wrap: wrap; }
  }
</style>
</body>
</html>
