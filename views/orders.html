<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — {{SITE_NAME}}</title>
  <link rel='icon' type='image/x-icon' href='{{SITE_FAVICON}}'>
  <link rel="stylesheet" href="/css/main.css" />
  <script src="/js/preloader.js"></script>
  <style>
    .orders-page { max-width: 900px; margin: 0 auto; }
    
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .page-title h1 { font-size: 24px; font-weight: 700; margin: 0; }
    .page-title p { font-size: 14px; color: var(--text-3); margin: 4px 0 0; }
    
    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 4px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .filter-tab {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      background: none;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-tab:hover { color: var(--text); background: var(--surface-2); }
    .filter-tab.active { background: var(--accent); color: #fff; }
    
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .order-card:hover {
      border-color: var(--accent);
      transform: translateX(4px);
      box-shadow: 0 4px 20px rgba(59,130,246,0.1);
    }
    
    .order-main { flex: 1; min-width: 0; }
    .order-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 6px;
    }
    .order-service {
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .order-meta {
      font-size: 13px;
      color: var(--text-2);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .order-meta span { display: flex; align-items: center; gap: 4px; }
    
    .order-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .order-price {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }
    
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .status-dot::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-dot.active { background: rgba(16,185,129,0.15); color: var(--success); }
    .status-dot.active::before { background: var(--success); animation: pulse-dot 2s infinite; }
    .status-dot.completed { background: rgba(59,130,246,0.15); color: var(--accent); }
    .status-dot.completed::before { background: var(--accent); }
    .status-dot.refunded { background: rgba(245,158,11,0.15); color: var(--warning); }
    .status-dot.refunded::before { background: var(--warning); }
    .status-dot.expired, .status-dot.cancelled { background: rgba(100,116,139,0.15); color: var(--text-3); }
    .status-dot.expired::before, .status-dot.cancelled::before { background: var(--text-3); }
    
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }
    
    .otp-preview {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      background: rgba(59,130,246,0.1);
      padding: 4px 10px;
      border-radius: 6px;
      max-width: 120px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 14px; color: var(--text-3); margin-bottom: 24px; }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
    }
    .page-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    
    @media (max-width: 768px) {
      .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .filter-tabs { width: 100%; overflow-x: auto; }
      .order-card { flex-direction: column; align-items: flex-start; }
      .order-right { width: 100%; flex-direction: row; justify-content: space-between; align-items: center; }
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="/" class="nav-logo">⚡ {{SITE_NAME}}</a>
    <div class="nav-links" id="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/dashboard/buy">Buy</a>
      <a href="/dashboard/referrals">Referrals</a>
      <a href="/dashboard/orders" class="active">Orders</a>
      <a href="/dashboard/wallet">Wallet</a>
    </div>
    <button class="nav-burger" id="nav-burger">☰</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="/dashboard" class="sidebar-item">🏠 Home</a>
    <a href="/dashboard/buy" class="sidebar-item">🛒 Buy Number</a>
    <a href="/dashboard/orders" class="sidebar-item active">📋 My Orders</a>
    <a href="/dashboard/referrals" class="sidebar-item">🤝 Referrals</a>
    <a href="/dashboard/wallet" class="sidebar-item">💰 Wallet</a>
    <a href="/dashboard/profile" class="sidebar-item">👤 Profile</a>
    <div class="sidebar-divider"></div>
    <button onclick="logout()" class="sidebar-item" style="width:100%;background:none;border:none;text-align:left;color:var(--danger)">🚪 Logout</button>
  </aside>
  <main class="main-content">
    <div class="orders-page">
      <div class="page-header">
        <div class="page-title">
          <h1>My Orders</h1>
          <p>Your virtual number purchases</p>
        </div>
        <a href="/dashboard/buy" class="btn btn-primary">+ New Order</a>
      </div>
      
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all')">All</button>
        <button class="filter-tab" onclick="setFilter('active')">Active</button>
        <button class="filter-tab" onclick="setFilter('completed')">Completed</button>
        <button class="filter-tab" onclick="setFilter('cancelled')">Cancelled</button>
      </div>
      
      <div id="orders-list" style="margin-top: 24px;">
        <div style="padding:40px;text-align:center;opacity:0.5">Syncing with blockchain...</div>
      </div>
      
      <div id="pagination"></div>
    </div>
  </main>
</div>


<script src="/js/main.js"></script>
<script src="/js/ambient-bg.js"></script>
`n
<script>
{
  if (!requireLogin()) {}
  
  let currentPage = 1, currentFilter = 'all';
  
  async function loadOrders(page = 1, isBackground = false) {
    currentPage = page;
    const list = document.getElementById('orders-list');
    if (!list) return;
    if (!isBackground) {
       list.innerHTML = Array(5).fill(0).map(() => `
          <div class="order-card" style="pointer-events:none">
            <div class="skeleton skeleton-circle" style="width:40px;height:40px;flex-shrink:0"></div>
            <div class="order-main">
              <div class="skeleton skeleton-text" style="width:140px;height:16px;margin-bottom:8px"></div>
              <div class="skeleton skeleton-text short" style="width:100px;height:12px"></div>
            </div>
            <div class="order-right">
              <div class="skeleton skeleton-text" style="width:60px;height:18px"></div>
              <div class="skeleton skeleton-text" style="width:80px;height:24px;border-radius:20px"></div>
            </div>
          </div>
        `).join('');
    }
    
    try {
      const data = await API.get(`/api/user/orders?status=${currentFilter}&page=${page}&limit=15`);
      
      if (!data.orders.length) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>No orders yet</h3>
            <p>Purchase a virtual number to get started</p>
            <a href="/dashboard/buy" class="btn btn-primary">Buy Number</a>
          </div>`;
        const pagEl = document.getElementById('pagination');
        if (pagEl) pagEl.innerHTML = '';
        return;
      }
      
      list.innerHTML = data.orders.map(o => `
        <div class="order-card" onclick="SPA.navigate('/dashboard/orders/${o.order_id}')">
          <div style="width:40px;height:40px;border-radius:10px;overflow:hidden;background:var(--bg-2);display:flex;align-items:center;justify-content:center;flex-shrink:0">
             ${getServiceIcon({ name: o.service_name, image_url: o.service_image, icon_color: o.service_color }, '40px')}
          </div>
          <div class="order-main">
            <div class="order-id">${o.order_id}</div>
            <div class="order-service">
              ${o.service_name}
              ${o.otp ? `<span class="otp-preview">${o.otp}</span>` : ''}
            </div>
            <div class="order-meta">
              <span>🌍 ${o.server_country || o.country || '—'}</span>
              <span>📞 ${o.phone ? o.phone.replace(/(\d{2})\d{4}(\d{4})/, '$1****$2') : 'Pending'}</span>
              <span>🕐 ${fmtDateShort(o.createdAt)}</span>
            </div>
          </div>
          <div class="order-right">
            <div class="order-price">${fmtMoney(o.cost)}</div>
            <div class="status-dot ${o.status}">${(o.status === 'expired' ? 'Cancelled' : (o.status.charAt(0).toUpperCase() + o.status.slice(1)))}</div>
          </div>
        </div>
      `).join('');
      
      renderPagination('pagination', data.page, data.pages, "loadOrders");
    } catch (e) {
      toast(e.message, 'error');
    }
  }
  
  window.setFilter = function(status) {
    currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    loadOrders(1);
  };

  window.loadOrders = loadOrders;
  window.initOrders = () => loadOrders(currentPage, true);
  loadOrders();

  const polling = setInterval(() => {
    if (document.visibilityState === 'visible') loadOrders(currentPage, true);
  }, 10000);
  window.addEventListener('popstate', () => clearInterval(polling), { once: true });
}
</script>
<script src="/js/main.js"></script><script src="/js/ambient-bg.js"></script></body>
</html>
